name: CI

on:
  push:
  pull_request:
    branches: [main,dev]
jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
        
      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run

      - name: Run tests
        run: npm run test